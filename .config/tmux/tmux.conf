set -g prefix C-t
unbind C-b

set -g base-index 1
set -g clock-mode-style 24
set -g default-terminal screen-256color
set -g display-time 4000
set -g escape-time 0
set -g history-limit 10000
set -g mode-style bg=red,fg=black
set -g status-interval 1
set -g status-position bottom
set -g terminal-overrides 'xterm:colors=256'

setw -g pane-base-index 1
setw -g window-style bg=terminal
setw -g window-active-style bg=terminal

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -n S-left select-pane -L
bind -n S-down select-pane -D
bind -n S-up select-pane -U
bind -n S-right select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind Space choose-window
bind q kill-pane
bind Q kill-window

# theme
source-file ~/.config/tmux/tmux-gruvbox-dark.conf

# tmux-continuum
set -g @continuum-save-interval '60'
set -g @continuum-restore 'on'

# Use vim keybindings in copy mode
setw -g mode-keys vi
set -g default-command "exec reattach-to-user-namespace -l $SHELL"
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "reattach-to-user-namespace pbcopy"
unbind -T copy-mode-vi Enter
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "reattach-to-user-namespace pbcopy"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run -b '~/.tmux/plugins/tpm/tpm'
