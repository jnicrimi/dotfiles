[tools]
pnpm = "11.9.0"
node = "24.18.0"
actionlint = "1.7.12"
zizmor = "1.26.1"
gitleaks = "8.30.1"
lefthook = "2.1.9"
shellcheck = "0.11.0"
"aqua:Kampfkarren/selene" = "0.31.0"
stylua = "2.5.2"

[tasks.setup]
description = "環境基盤を最新化"
run = ["mise install", "lefthook install", "pnpm install --frozen-lockfile"]

[tasks.yamllint]
description = "YAML を検証"
raw_args = true
run = "uvx --python-preference only-managed yamllint==1.38.0"

[tasks.sync]
description = "dotfiles を $HOME に同期"
run = "stow --dir={{config_root}} --target=$HOME --restow --no-folding home"

[task_config]
includes = ["mise-tasks/update.toml"]
