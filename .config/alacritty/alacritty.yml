---

env:
  TERM: xterm-256color

font:
  normal:
    family: Hack Nerd Font
    style: Regular
  bold:
    family: Hack Nerd Font
    style: Bold
  italic:
    family: Hack Nerd Font
    style: Italic
  bold_italic:
    family: Hack Nerd Font
    style: Bold Italic
  size: 14.0

mouse:
  hide_when_typing: true

key_bindings:
  - {key: Return, mods: Command, action: ToggleFullscreen}

import:
  - ~/.dotfiles/.config/alacritty/colors/nord.yml
